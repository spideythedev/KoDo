      color: #EDEDEF;
      overscroll-behavior: none;
    }
    .glass {
      background: rgba(10,10,12,0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .border-subtle { border-color: rgba(255,255,255,0.06); }
    .safe-top { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .animate-float { animation: float 3s ease-in-out infinite; }
    @keyframes celebrate {
      0% { transform: scale(1); }
      50% { transform: scale(1.2) rotate(5deg); }
      100% { transform: scale(1); }
    }
    .celebrate { animation: celebrate 0.5s ease; }
    .monaco-editor .margin { background: #0A0A0C !important; }
    .prose code { background: rgba(125,249,194,0.08); color: #7DF9C2; padding: 2px 6px; border-radius: 4px; }
    .screen { display: none; }
    .screen.active { display: block; }
    #screen-lesson { display: none; flex-direction: column; min-height: 100vh; }
    #screen-lesson.active { display: flex; }
