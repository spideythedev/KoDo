<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KoDo — The Forge</title>
    <!-- Tailwind + Base Theme Overrides -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Geist & Inter Fonts (Vercel Inspired) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        /* Arceus-tier Spatial Dark Mode Overrides */
        body { 
            background-color: #000000; 
            color: #EDEDEF; 
            overscroll-behavior: none;
        }
        /* Custom Glassmorphism Utility (Tailwind doesn't do pure blur well) */
        .glass-panel {
            background: rgba(10, 10, 12, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .border-subtle { border-color: rgba(255, 255, 255, 0.08); }
        /* Monaco Editor Container */
        .monaco-editor-container { height: 100%; width: 100%; }
    </style>
    <!-- Monaco Loader (Global) -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.39.0/min/vs/loader.js"></script>
</head>
<body class="antialiased">

    <!-- Main Application Mount -->
    <div id="app-root" class="h-screen w-screen flex flex-col overflow-hidden bg-black">
        <!-- Loading State (Cinematic Pulse) -->
        <div class="flex-1 flex items-center justify-center">
            <div class="w-2 h-2 bg-blue-500/50 rounded-full animate-pulse"></div>
        </div>
    </div>

    <!-- Module Preload -->
    <script type="module" src="./app.js"></script>
    
    <!-- Vercel Analytics (Optional, Premium feel) -->
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
