<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KoDo — Discord Forge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { background: #000; color: #EDEDEF; font-family: 'Space Grotesk', sans-serif; }
    .glass { background: rgba(10,10,12,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); }
  </style>
</head>
<body class="flex items-center justify-center h-screen">
  <div class="glass p-8 rounded-2xl text-center max-w-md">
    <div class="text-4xl mb-4">🐨</div>
    <h1 class="text-2xl font-bold mb-2">KoDo Forge</h1>
    <p class="text-white/50 mb-6">Platform is initializing...</p>
    <div class="h-1 bg-white/10 rounded-full overflow-hidden">
      <div class="h-full w-1/2 bg-blue-500 animate-pulse"></div>
    </div>
    <p class="text-xs text-white/30 mt-4">Check console for errors (F12)</p>
  </div>
</body>
</html>
