          { type:'challenge', title:'Log Ready', instruction:'Write an event listener for "ready" that logs "Bot is online!" using console.log.', lang:'javascript', starterCode:'// Simulate client.once("ready", ...)\nfunction onReady(callback) { callback(); }\n\nonReady(() => {\n  // Your log here\n});\n', hint:'console.log("Bot is online!");', tests:[{name:'Logs correct message',expr:`(function(){ let msg; const orig=console.log; console.log=(m)=>msg=m; eval(code); console.log=orig; return msg==="Bot is online!"; })()`}] }
