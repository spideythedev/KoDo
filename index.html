<body class="overflow-hidden">

<svg style="display:none;"><defs>
<symbol id="icon-google" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></symbol>

<symbol id="icon-mail" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></symbol>

<symbol id="icon-code" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m8 0l-3-3 3-3"/></symbol>

<div id="app-root" class="h-screen w-screen"></div>

<div id="k-mascot-container" class="fixed bottom-5 right-5 z-50 pointer-events-none">
    <div id="k-bubble" class="glass-panel p-3 rounded-2xl mb-2 text-sm max-w-[220px] shadow-xl opacity-0 transition-opacity duration-300 text-white/90"></div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, signOut, updateProfile, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const firebaseConfig = { apiKey:"AIzaSyCGd7y12N9iaDmR912XefuUZQtIAPnmQZ8", authDomain:"kodo-559e9.firebaseapp.com", projectId:"kodo-559e9", storageBucket:"kodo-559e9.firebasestorage.app", messagingSenderId:"931573681729", appId:"1:931573681729:web:064234b9b2b626493e00c0" };
    const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app); const googleProvider = new GoogleAuthProvider();

    let pyodide = null;
    async function loadPyodide(){ if(!pyodide) pyodide = await loadPyodide({ indexURL:"https://cdn.jsdelivr.net/pyodide/v0.24.1/full/" }); return pyodide; }

    // ==================== MASSIVE CURRICULUM ====================
    const CURRICULUM = { tracks:[
        { id:'js', name:'JavaScript', icon:'🟨', color:'#F7DF1E', desc:'The language of the web.' },
        { id:'py', name:'Python', icon:'🐍', color:'#3776AB', desc:'Simple and powerful.' },
        { id:'java', name:'Java', icon:'☕', color:'#007396', desc:'Enterprise and Android.' },
        { id:'cpp', name:'C++', icon:'⚡', color:'#00599C', desc:'Performance and systems.' },
        { id:'discordjs', name:'Discord.js', icon:'💬', color:'#5865F2', desc:'Build bots for Discord.' }
    ], courses:{
        js:{ title:'JavaScript Mastery', desc:'From zero to async.', lessons:[
            { id:'js-vars', title:'Variables & Types', steps:[
                { type:'text', title:'What are Variables?', content:'Variables store data. Use <code>let</code> for changeable values, <code>const</code> for constants.', example:'let age = 25;\nconst name = "KoDo";\nconsole.log(age, name);' },
                { type:'challenge', title:'Declare Variables', instructions:'Create a variable <code>city</code> with your city, and a constant <code>PI</code> with 3.14. Log both.', starterCode:'', testCases:[ { desc:'city defined', test:'return typeof city !== "undefined";' }, { desc:'PI is 3.14', test:'return typeof PI !== "undefined" && PI === 3.14;' } ], hints:['let city = "Paris"; const PI = 3.14; console.log(city, PI);'] }
            ]},
            { id:'js-funcs', title:'Functions', steps:[
                { type:'text', title:'Reusable Blocks', content:'Functions are reusable. Define with <code>function</code> or arrow <code>()=></code>.', example:'function greet(name){ return "Hello, " + name; }\nconst greetArrow = (name) => "Hello, " + name;' },
                { type:'challenge', title:'Write a Function', instructions:'Create a function <code>add(a,b)</code> that returns the sum.', starterCode:'', testCases:[ { desc:'add exists', test:'return typeof add === "function";' }, { desc:'add(2,3) returns 5', test:'return add(2,3)===5;' } ], hints:['function add(a,b){ return a+b; }'] }
            ]},
            { id:'js-arrays', title:'Arrays', steps:[
                { type:'text', title:'Lists of Data', content:'Arrays hold ordered lists. Access with index.', example:'let fruits = ["apple","banana"];\nconsole.log(fruits[0]);' },
                { type:'challenge', title:'Array Methods', instructions:'Create an array <code>numbers</code> with [1,2,3]. Use <code>.push(4)</code> and log the length.', starterCode:'', testCases:[ { desc:'numbers is [1,2,3,4]', test:'return numbers.length===4 && numbers[3]===4;' } ], hints:['let numbers=[1,2,3]; numbers.push(4); console.log(numbers.length);'] }
            ]},
            { id:'js-objects', title:'Objects', steps:[
                { type:'text', title:'Key-Value Pairs', content:'Objects store properties.', example:'let user = { name:"KoDo", age:1 };\nconsole.log(user.name);' },
                { type:'challenge', title:'Create an Object', instructions:'Create an object <code>car</code> with properties <code>brand</code> and <code>year</code>.', starterCode:'', testCases:[ { desc:'car has brand', test:'return car.brand !== undefined;' }, { desc:'car has year', test:'return car.year !== undefined;' } ], hints:['let car = { brand:"Toyota", year:2020 };'] }
            ]},
            { id:'js-loops', title:'Loops', steps:[
                { type:'text', title:'Iteration', content:'Loops repeat code. <code>for</code> and <code>while</code>.', example:'for(let i=0;i<3;i++){ console.log(i); }' },
                { type:'challenge', title:'Sum with Loop', instructions:'Use a for loop to sum numbers from 1 to 5 into variable <code>total</code>.', starterCode:'', testCases:[ { desc:'total is 15', test:'return total===15;' } ], hints:['let total=0; for(let i=1;i<=5;i++) total+=i;'] }
            ]}
        ]},
        py:{ title:'Python Fundamentals', desc:'From basics to data science.', lessons:[
            { id:'py-vars', title:'Variables', steps:[
                { type:'text', title:'No Keywords Needed', content:'Python variables are dynamic. Just assign.', example:'age = 25\nname = "KoDo"\nprint(age, name)' },
                { type:'challenge', title:'Create Variables', instructions:'Create <code>city</code> and <code>population</code>. Print them.', starterCode:'', testCases:[ { desc:'city defined', test:`'city' in locals()` }, { desc:'population defined', test:`'population' in locals()` } ], hints:['city = "Paris"; population = 2_000_000; print(city, population)'] }
            ]},
            { id:'py-funcs', title:'Functions', steps:[
                { type:'text', title:'def keyword', content:'Define functions with <code>def</code>.', example:'def greet(name):\n    return "Hello, " + name' },
                { type:'challenge', title:'Write multiply', instructions:'Define <code>multiply(a,b)</code> returning product.', starterCode:'', testCases:[ { desc:'multiply exists', test:`'multiply' in locals() and callable(multiply)` }, { desc:'multiply(3,4)==12', test:`multiply(3,4)==12` } ], hints:['def multiply(a,b): return a*b'] }
            ]}
        ]},
        java:{ title:'Java Core', desc:'Object-oriented programming.', lessons:[
            { id:'java-hello', title:'Hello World', steps:[
                { type:'text', title:'Java Structure', content:'Java requires a class and main method.', example:'public class Main {\n  public static void main(String[] args) {\n    System.out.println("Hello");\n  }\n}' },
                { type:'challenge', title:'Print Message', instructions:'Write a program that prints "I love Java"', starterCode:'public class Main {\n  public static void main(String[] args) {\n    // Your code\n  }\n}', testCases:[ { desc:'Prints correct message', test:`return code.contains("I love Java")` } ], hints:['System.out.println("I love Java");'] }
            ]}
        ]},
        cpp:{ title:'C++ Essentials', lessons:[
            { id:'cpp-hello', title:'First Program', steps:[
                { type:'text', title:'Includes and main', content:'C++ uses <code>#include</code> and <code>int main()</code>.', example:'#include <iostream>\nint main() {\n  std::cout << "Hello";\n  return 0;\n}' },
                { type:'challenge', title:'Output', instructions:'Print "C++ is powerful"', starterCode:'#include <iostream>\nint main() {\n  // Your code\n  return 0;\n}', testCases:[ { desc:'Contains output statement', test:`return code.includes("C++ is powerful")` } ], hints:['std::cout << "C++ is powerful";'] }
            ]}
        ]},
        discordjs:{ title:'Discord Bot Basics', lessons:[
            { id:'djs-ping', title:'Ping Pong', steps:[
                { type:'text', title:'Setup', content:'Use <code>Client</code> with intents.', example:'const { Client, GatewayIntentBits } = require("discord.js");\nconst client = new Client({ intents: [GatewayIntentBits.Guilds, GatewayIntentBits.GuildMessages, GatewayIntentBits.MessageContent] });' },
                { type:'challenge', title:'Respond to !ping', instructions:'Listen for messageCreate, if content is "!ping", reply "Pong!".', starterCode:'const { Client, GatewayIntentBits } = require("discord.js");\nconst client = new Client({ intents: [GatewayIntentBits.Guilds, GatewayIntentBits.GuildMessages, GatewayIntentBits.MessageContent] });\nclient.on("messageCreate", async (message) => {\n  // Your code\n});\nclient.login("token");', testCases:[ { desc:'Checks for "!ping"', test:`return code.includes('"!ping"') || code.includes("'!ping'")` }, { desc:'Replies with Pong', test:`return code.includes('"Pong!"') || code.includes("'Pong!'")` } ], hints:['if (message.content === "!ping") await message.reply("Pong!");'] }
            ]}
        ]}
    }};

    function getAllLessons(){ const lessons=[]; for(const t in CURRICULUM.courses){ CURRICULUM.courses[t].lessons.forEach((l,i)=>{ lessons.push({ trackId:t, lessonId:l.id, title:l.title }); }); } return lessons; }

    const AppState = new Proxy({ user:null, profile:null, route:'auth', authMode:'login', currentTrack:'js', currentLessonIndex:0, currentStepIndex:0, editorInstance:null }, { set(t,p,v){ t[p]=v; if(p!=='editorInstance') render(); return true; } });
    const root = document.getElementById('app-root');
    function render(){ if(!AppState.user) renderAuth(); else if(AppState.route==='dashboard') renderDashboard(); else if(AppState.route==='track') renderTrack(); else if(AppState.route==='lesson') renderLesson(); }

    function renderAuth(){ const isLogin=AppState.authMode==='login'; root.innerHTML=`<div class="flex flex-col items-center justify-center min-h-screen p-6 safe-top safe-bottom"><div class="w-full max-w-md"><div class="text-center mb-8"><svg width="64" height="64"><use href="#icon-koala"/></svg><h1 class="text-5xl font-light">KoDo</h1></div><div class="glass-panel rounded-2xl p-6"><div class="flex mb-6 border-b border-subtle"><button class="auth-tab flex-1 pb-3 text-sm ${isLogin?'text-white border-b-2 border-blue-500':'text-white/40'}" data-mode="login">Sign In</button><button class="auth-tab flex-1 pb-3 text-sm ${!isLogin?'text-white border-b-2 border-blue-500':'text-white/40'}" data-mode="register">Register</button></div><button id="google-signin" class="w-full glass-panel py-3 rounded-lg flex items-center justify-center gap-3"><svg width="20"><use href="#icon-google"/></svg>Google</button><div class="relative my-6"><div class="border-t border-subtle"></div><span class="absolute left-1/2 -translate-x-1/2 bg-black px-3 text-white/30 text-xs">or</span></div><form id="auth-form" class="space-y-4">${!isLogin?'<input id="displayName" placeholder="Name" class="w-full bg-white/5 border border-subtle rounded-lg px-4 py-3">':''}<input id="email" type="email" placeholder="Email" required class="w-full bg-white/5 border border-subtle rounded-lg px-4 py-3"><input id="password" type="password" placeholder="Password" required class="w-full bg-white/5 border border-subtle rounded-lg px-4 py-3">${isLogin?'<div class="text-right"><button type="button" id="forgot" class="text-xs text-white/40">Forgot?</button></div>':''}<div id="auth-error" class="text-xs text-red-400 hidden"></div><button type="submit" class="w-full bg-white/5 border border-subtle py-3 rounded-lg">${isLogin?'Sign In':'Create Account'}</button></form><p class="text-center text-xs text-white/30 mt-6">${isLogin?"No account?":"Have an account?"} <button id="switch-mode" class="text-blue-400">${isLogin?'Sign up':'Sign in'}</button></p></div></div></div>`;
        document.querySelectorAll('.auth-tab').forEach(b=>b.addEventListener('click',()=>AppState.authMode=b.dataset.mode));
        document.getElementById('switch-mode').onclick=()=>AppState.authMode=AppState.authMode==='login'?'register':'login';
        document.getElementById('google-signin').onclick=()=>signInWithPopup(auth,googleProvider).catch(e=>showAuthError(e.code));
        document.getElementById('auth-form').onsubmit=async e=>{ e.preventDefault(); const email=document.getElementById('email').value, pwd=document.getElementById('password').value, name=document.getElementById('displayName')?.value; try{ if(AppState.authMode==='register'){ const cred=await createUserWithEmailAndPassword(auth,email,pwd); if(name) await updateProfile(cred.user,{displayName:name}); } else await signInWithEmailAndPassword(auth,email,pwd); }catch(e){ showAuthError(e.code); } };
        document.getElementById('forgot')?.addEventListener('click',async()=>{ const email=document.getElementById('email').value; if(!email) return showAuthError('Enter email'); await sendPasswordResetEmail(auth,email); showAuthError('Reset email sent!','success'); });
        function showAuthError(m,t='error'){ const el=document.getElementById('auth-error'); el.textContent=m; el.classList.remove('hidden','text-red-400','text-emerald-400'); el.classList.add(t==='success'?'text-emerald-400':'text-red-400'); }
    }

    async function renderDashboard(){ const user=AppState.user; const ref=doc(db,'users',user.uid); let profile=(await getDoc(ref)).data(); if(!profile){ profile={stones:0,streak:0,completedLessons:{},lastActive:new Date().toDateString()}; await setDoc(ref,profile); } const today=new Date().toDateString(); if(profile.lastActive!==today){ const yesterday=new Date(Date.now()-86400000).toDateString(); profile.streak=(profile.lastActive===yesterday)?(profile.streak||0)+1:1; profile.lastActive=today; await updateDoc(ref,{streak:profile.streak,lastActive:today}); } AppState.profile=profile; const tracks=CURRICULUM.tracks; const completedCount=Object.keys(profile.completedLessons||{}).length; const totalLessons=getAllLessons().length;
    root.innerHTML=`<div class="h-full flex flex-col"><header class="px-5 py-4 flex justify-between border-b border-subtle safe-top"><div><h1 class="text-xl">${user.displayName?.split(' ')[0]||'Coder'}</h1><div class="flex items-center gap-2 text-sm"><span class="text-yellow-400">●</span> ${profile.stones} <span class="text-orange-400 ml-2">🔥</span> ${profile.streak}</div></div><button id="signout" class="text-white/40 p-2"><svg width="24"><use href="#icon-close"/></svg></button></header><div class="flex-1 overflow-auto p-5"><div class="glass-panel rounded-2xl p-5 mb-6"><h2 class="text-lg flex items-center gap-2"><svg width="24"><use href="#icon-dashboard"/></svg>Progress</h2><div class="h-2 bg-white/10 rounded-full my-2"><div class="h-full bg-emerald-500 rounded-full" style="width:${(completedCount/totalLessons)*100}%"></div></div><p class="text-xs text-white/40">${completedCount}/${totalLessons} lessons</p></div><div class="grid grid-cols-1 md:grid-cols-2 gap-4">${tracks.map(t=>{ const p=getTrackProgress(t.id,profile); return `<div class="glass-panel rounded-xl p-5 cursor-pointer hover:bg-white/5" data-track="${t.id}"><div class="text-3xl mb-2">${t.icon}</div><h3 class="text-lg font-medium">${t.name}</h3><p class="text-xs text-white/50">${t.desc}</p><div class="mt-4 flex items-center gap-2"><div class="flex-1 h-1.5 bg-white/10 rounded-full"><div class="h-full rounded-full" style="width:${p.percent}%;background:${t.color}"></div></div><span class="text-xs">${p.completed}/${p.total}</span></div></div>`; }).join('')}</div></div></div>`;
    document.querySelectorAll('[data-track]').forEach(el=>el.addEventListener('click',()=>{ AppState.currentTrack=el.dataset.track; AppState.currentLessonIndex=0; AppState.route='track'; }));
    document.getElementById('signout').onclick=()=>signOut(auth);
    function getTrackProgress(tid,p){ const c=CURRICULUM.courses[tid]; if(!c) return {completed:0,total:0,percent:0}; const total=c.lessons.length; let completed=0; c.lessons.forEach(l=>{ if(p.completedLessons?.[`${tid}_${l.id}`]) completed++; }); return {completed,total,percent:(completed/total)*100}; } }

    function renderTrack(){ const track=CURRICULUM.tracks.find(t=>t.id===AppState.currentTrack); const course=CURRICULUM.courses[AppState.currentTrack]; const profile=AppState.profile;
    root.innerHTML=`<div class="h-full flex flex-col safe-top"><header class="px-4 py-3 flex items-center gap-3 border-b border-subtle"><button id="back" class="p-2"><svg width="24"><use href="#icon-arrow-left"/></svg></button><div class="text-xl font-medium flex items-center gap-2"><span>${track.icon}</span> ${track.name}</div></header><div class="flex-1 overflow-auto p-5"><p class="text-white/60 mb-6">${course.desc}</p><div class="space-y-3">${course.lessons.map((l,idx)=>{ const isLocked=idx>0 && !profile.completedLessons?.[`${AppState.currentTrack}_${course.lessons[idx-1].id}`]; const isCompleted=profile.completedLessons?.[`${AppState.currentTrack}_${l.id}`]; return `<div class="glass-panel rounded-xl p-4 flex items-center gap-4 ${isLocked?'opacity-40':'cursor-pointer hover:bg-white/5'}" data-lesson-index="${idx}"><div class="w-10 h-10 rounded-full flex items-center justify-center ${isCompleted?'bg-emerald-500/20 border border-emerald-400':'bg-white/5 border border-subtle'}">${isCompleted?'<svg width="20"><use href="#icon-check"/></svg>':`<span class="text-sm font-mono">${idx+1}</span>`}</div><div class="flex-1"><h3 class="font-medium">${l.title}</h3><p class="text-xs text-white/40">${l.steps.length} steps</p></div>${isLocked?'<svg width="20" class="text-white/30"><use href="#icon-lock"/></svg>':'<svg width="20" class="text-white/20"><use href="#icon-arrow-right"/></svg>'}</div>`; }).join('')}</div></div></div>`;
    document.getElementById('back').onclick=()=>AppState.route='dashboard';
    document.querySelectorAll('[data-lesson-index]').forEach(el=>{ if(el.classList.contains('opacity-40')) return; el.addEventListener('click',()=>{ AppState.currentLessonIndex=parseInt(el.dataset.lessonIndex); AppState.currentStepIndex=0; AppState.route='lesson'; }); }); }

    function renderLesson(){ const track=CURRICULUM.courses[AppState.currentTrack]; const lesson=track.lessons[AppState.currentLessonIndex]; const step=lesson.steps[AppState.currentStepIndex]; const langMap={ js:'javascript', py:'python', java:'java', cpp:'cpp', discordjs:'javascript' }; const language=langMap[AppState.currentTrack]||'javascript';
    root.innerHTML=`<div class="h-full flex flex-col safe-top"><header class="px-4 py-3 flex items-center gap-3 border-b border-subtle"><button id="back" class="p-2"><svg width="24"><use href="#icon-arrow-left"/></svg></button><div class="flex-1"><div class="text-xs text-white/40">${track.title}</div><div class="text-sm font-medium">${lesson.title} · Step ${AppState.currentStepIndex+1}/${lesson.steps.length}</div></div><button id="menu" class="p-2"><svg width="24"><use href="#icon-dashboard"/></svg></button></header><div class="flex-1 overflow-auto p-5">${step.type==='text'?`<div class="prose prose-invert max-w-none"><h2 class="text-xl font-semibold mb-4">${step.title}</h2><div class="text-white/70 space-y-4">${step.content}</div>${step.example?`<div class="glass-panel p-4 rounded-xl mt-6"><div class="text-xs text-white/40 mb-2">Example</div><pre class="text-emerald-400 text-sm font-mono whitespace-pre-wrap">${escapeHtml(step.example)}</pre><button class="run-example mt-3 text-blue-400 text-sm flex items-center gap-1"><svg width="16"><use href="#icon-play"/></svg>Run</button><div class="example-output mt-2 text-sm text-white/60 font-mono"></div></div>`:''}</div>`:`<div><h2 class="text-xl font-semibold mb-2">${step.title}</h2><p class="text-white/60 mb-4">${step.instructions}</p><div class="glass-panel rounded-xl overflow-hidden border border-subtle"><div id="editor-container" style="height:300px;"></div></div><div class="flex gap-3 mt-4"><button id="run-tests" class="flex-1 bg-blue-500/20 border border-blue-400 py-3 rounded-lg flex items-center justify-center gap-2"><svg width="16"><use href="#icon-play"/></svg>Run Tests</button><button id="hint-btn" class="glass-panel px-4 py-3"><svg width="20"><use href="#icon-hint"/></svg></button></div><div id="test-results" class="mt-4 space-y-2"></div></div>`}</div><div class="p-4 border-t border-subtle flex justify-between safe-bottom"><button id="prev" ${AppState.currentStepIndex===0?'disabled':''} class="glass-panel px-5 py-3 rounded-lg text-sm">Previous</button><button id="next" class="bg-white/5 border border-subtle px-5 py-3 rounded-lg text-sm font-medium">${AppState.currentStepIndex===lesson.steps.length-1?'Complete':'Next'}</button></div></div>`;
    document.getElementById('back').onclick=()=>AppState.route='track';
    document.getElementById('menu').onclick=()=>AppState.route='dashboard';
    if(step.type==='challenge'){ setTimeout(()=>{ require(['vs/editor/editor.main'],()=>{ const editor=monaco.editor.create(document.getElementById('editor-container'),{ value:step.starterCode, language, theme:'vs-dark', minimap:{enabled:false}, fontSize:13, automaticLayout:true }); AppState.editorInstance=editor; document.getElementById('run-tests').onclick=()=>runTests(step,editor.getValue(),language); document.getElementById('hint-btn').onclick=()=>showKMessage(step.hints[0]||'Think step by step.'); }); },50); } else { document.querySelector('.run-example')?.addEventListener('click',async e=>{ const code=step.example; let out=''; if(language==='python') out=await runPython(code); else out=await runJavaScript(code); e.target.nextElementSibling.textContent=out||'(no output)'; }); }
    document.getElementById('prev').onclick=()=>{ if(AppState.currentStepIndex>0){ AppState.currentStepIndex--; renderLesson(); } };
    document.getElementById('next').onclick=async()=>{ if(AppState.currentStepIndex<lesson.steps.length-1){ AppState.currentStepIndex++; renderLesson(); } else { const prof=AppState.profile; const key=`${AppState.currentTrack}_${lesson.id}`; if(!prof.completedLessons) prof.completedLessons={}; if(!prof.completedLessons[key]){ prof.completedLessons[key]=true; prof.stones=(prof.stones||0)+10; await updateDoc(doc(db,'users',AppState.user.uid),{stones:prof.stones,completedLessons:prof.completedLessons}); showKMessage('Lesson complete! +10 Stones'); } AppState.route='track'; } }; }

    async function runJavaScript(code){ return new Promise(res=>{ const w=new Worker(URL.createObjectURL(new Blob(['self.onmessage=e=>{const logs=[];console.log=(...a)=>logs.push(a.join(" "));try{eval(e.data);self.postMessage(logs.join("\\n"));}catch(e){self.postMessage("Error: "+e.message);}}'],{type:'application/javascript'}))); w.onmessage=e=>{res(e.data); w.terminate();}; w.postMessage(code); }); }
    async function runPython(code){ const pd=await loadPyodide(); pd.runPython('import sys; from io import StringIO; sys.stdout = StringIO()'); try{ pd.runPython(code); return pd.runPython('sys.stdout.getvalue()'); }catch(e){ return e.toString(); } }
    async function runTests(step, code, lang){ const resDiv=document.getElementById('test-results'); resDiv.innerHTML='Running...'; let results=[]; for(let tc of step.testCases){ let passed=false, error=null; try{ if(lang==='python'){ const full=`${code}\n${tc.test}`; const pd=await loadPyodide(); passed=pd.runPython(full); } else { passed=await evalTestCaseJS(code, tc.test); } }catch(e){ error=e.message; } results.push({...tc, passed, error}); } resDiv.innerHTML=results.map(r=>`<div class="flex items-start gap-2 p-2 rounded ${r.passed?'bg-emerald-500/10':'bg-red-500/10'}"><svg width="16" class="${r.passed?'text-emerald-400':'text-red-400'}"><use href="${r.passed?'#icon-check':'#icon-close'}"/></svg><div><p class="text-sm ${r.passed?'text-white/70':'text-red-300'}">${r.desc}</p>${r.error?`<p class="text-xs text-red-400/70">${r.error}</p>`:''}</div></div>`).join(''); if(results.every(r=>r.passed)) showKMessage('All tests passed! 🎉'); else showKMessage(`${results.filter(r=>r.passed).length}/${results.length} passing`); }
    function evalTestCaseJS(code, test){ return new Promise(res=>{ const w=new Worker(URL.createObjectURL(new Blob([`self.onmessage=e=>{try{eval(e.data.code); self.postMessage(!!eval(e.data.test));}catch(e){self.postMessage(false);}}`],{type:'application/javascript'}))); w.onmessage=e=>{res(e.data); w.terminate();}; w.postMessage({code, test}); }); }

    function escapeHtml(t){ return t.replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function showKMessage(text){ const b=document.getElementById('k-bubble'); b.textContent=text; b.style.opacity='1'; setTimeout(()=>b.style.opacity='0',4000); }

    onAuthStateChanged(auth, async u=>{ AppState.user=u; if(u){ const ref=doc(db,'users',u.uid); let p=(await getDoc(ref)).data(); if(!p){ p={stones:0,streak:0,completedLessons:{},lastActive:new Date().toDateString()}; await setDoc(ref,p); } AppState.profile=p; AppState.route='dashboard'; } else AppState.route='auth'; });
    render();
</script>
</body>
</html>
