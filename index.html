<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KoDo · Milky Way</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.39.0/min/vs/loader.js"></script>
    <!-- Pyodide for Python execution -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <style>
        /* Arceus-tier design */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #EDEDEF; overscroll-behavior: none; }
        .glass-panel { background: rgba(10,10,12,0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); }
        .border-subtle { border-color: rgba(255,255,255,0.06); }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
        @keyframes float { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-4px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .monaco-editor .margin { background: #0A0A0C !important; }
    </style>
</head>
<body class="overflow-hidden">

<!-- SVG Sprite -->
<svg style="display:none;">
    <defs>
        <symbol id="icon-google" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></symbol>
        <symbol id="icon-koala" viewBox="0 0 64 64"><circle cx="32" cy="32" r="28" fill="#4A5568" opacity="0.3"/><circle cx="22" cy="28" r="5" fill="#1A202C"/><circle cx="42" cy="28" r="5" fill="#1A202C"/><circle cx="22" cy="28" r="2" fill="white"/><circle cx="42" cy="28" r="2" fill="white"/><ellipse cx="32" cy="42" rx="8" ry="5" fill="#2D3748"/><path d="M14 16c-2-4-6-6-10-4" stroke="#718096" stroke-width="2" fill="none"/><path d="M50 16c2-4 6-6 10-4" stroke="#718096" stroke-width="2" fill="none"/></symbol>
        <symbol id="icon-island" viewBox="0 0 48 48"><path d="M24 40 L8 28 L24 16 L40 28 Z" fill="#2F855A" opacity="0.4"/><circle cx="24" cy="20" r="10" fill="#48BB78" opacity="0.6"/></symbol>
        <symbol id="icon-play" viewBox="0 0 24 24"><path fill="currentColor" d="M8 5v14l11-7z"/></symbol>
        <symbol id="icon-hint" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></symbol>
        <symbol id="icon-check" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></symbol>
        <symbol id="icon-close" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></symbol>
        <symbol id="icon-arrow-left" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></symbol>
        <symbol id="icon-arrow-right" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></symbol>
        <symbol id="icon-lock" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></symbol>
        <symbol id="icon-mail" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></symbol>
    </defs>
</svg>

<div id="app-root" class="h-screen w-screen"></div>

<!-- K. Mascot -->
<div id="k-mascot-container" class="fixed bottom-5 right-5 z-50 pointer-events-none">
    <div id="k-bubble" class="glass-panel p-3 rounded-2xl mb-2 text-sm max-w-[220px] shadow-xl opacity-0 transition-opacity duration-300 text-white/90"></div>
    <div class="w-14 h-14 pointer-events-auto cursor-pointer animate-float" id="k-mascot">
        <svg width="56" height="56"><use href="#icon-koala"/></svg>
    </div>
</div>

<script type="module">
    // ==================== IMPORTS & CONFIG ====================
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, signOut, updateProfile, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const firebaseConfig = {
        apiKey: "AIzaSyCGd7y12N9iaDmR912XefuUZQtIAPnmQZ8",
        authDomain: "kodo-559e9.firebaseapp.com",
        projectId: "kodo-559e9",
        storageBucket: "kodo-559e9.firebasestorage.app",
        messagingSenderId: "931573681729",
        appId: "1:931573681729:web:064234b9b2b626493e00c0"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    // Pyodide instance
    let pyodide = null;
    async function loadPyodide() {
        if (!pyodide) pyodide = await loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.24.1/full/" });
        return pyodide;
    }

    // ==================== CURRICULUM DATABASE ====================
    const CURRICULUM = {
        tracks: [
            { id: 'js', name: 'JavaScript', icon: '🟨', color: '#F7DF1E' },
            { id: 'py', name: 'Python', icon: '🐍', color: '#3776AB' },
            { id: 'java', name: 'Java', icon: '☕', color: '#007396' },
            { id: 'cpp', name: 'C++', icon: '⚡', color: '#00599C' },
            { id: 'discordjs', name: 'Discord.js', icon: '💬', color: '#5865F2' }
        ],
        courses: {
            js: {
                title: 'JavaScript Mastery',
                lessons: [
                    { id: 'js-vars', title: 'Variables & Data Types', steps: [
                        { type:'text', title:'What are Variables?', content:'Variables store data. In JavaScript, use <code>let</code> or <code>const</code>.', example:'let age = 25;\nconsole.log(age);' },
                        { type:'challenge', title:'Create a Variable', instructions:'Declare a variable <code>city</code> with your city name and log it.', starterCode:'// Your code', testCases:[
                            { desc:'city is defined', test:'return typeof city !== "undefined";' },
                            { desc:'city is a string', test:'return typeof city === "string";' }
                        ], hints:['Use let city = "Paris";'] }
                    ]},
                    { id: 'js-funcs', title: 'Functions', steps: [
                        { type:'text', title:'Functions', content:'Functions are reusable blocks. Define with <code>function</code> or arrow <code>()=></code>.', example:'function add(a,b){ return a+b; }' },
                        { type:'challenge', title:'Write a Multiply Function', instructions:'Create <code>multiply(a,b)</code> that returns product.', starterCode:'', testCases:[
                            { desc:'multiply exists', test:'return typeof multiply === "function";' },
                            { desc:'multiply(3,4) returns 12', test:'return multiply(3,4)===12;' }
                        ], hints:['function multiply(a,b){ return a*b; }'] }
                    ]},
                    // ... more lessons would be here in full version
                ]
            },
            py: {
                title: 'Python Fundamentals',
                lessons: [
                    { id: 'py-vars', title: 'Variables', steps: [
                        { type:'text', title:'Python Variables', content:'No need for let/const. Just <code>name = value</code>.', example:'age = 25\nprint(age)' },
                        { type:'challenge', title:'Create a Variable', instructions:'Create variable <code>planet</code> with "Earth" and print it.', starterCode:'', testCases:[
                            { desc:'planet defined', test:'return "planet" in locals()' },
                            { desc:'planet is "Earth"', test:'return planet == "Earth"' }
                        ], hints:['planet = "Earth"'] }
                    ]}
                ]
            },
            // Java, C++, Discord.js would have similar structure
        }
    };

    // ==================== STATE ====================
    const AppState = new Proxy({
        user: null, profile: null, route: 'auth', authMode: 'login',
        currentTrack: 'js', currentLessonIndex: 0, currentStepIndex: 0,
        editorInstance: null
    }, { set(t,p,v){ t[p]=v; if(p!=='editorInstance') render(); return true; } });

    const root = document.getElementById('app-root');
    function render() {
        if (!AppState.user) return renderAuth();
        if (AppState.route === 'dashboard') renderDashboard();
        else if (AppState.route === 'lesson') renderLesson();
    }

    // ==================== AUTH ====================
    function renderAuth() {
        const isLogin = AppState.authMode === 'login';
        root.innerHTML = `
            <div class="flex flex-col items-center justify-center min-h-screen p-6 safe-top safe-bottom">
                <div class="w-full max-w-md">
                    <div class="text-center mb-8"><svg width="64" height="64"><use href="#icon-koala"/></svg><h1 class="text-5xl font-light">KoDo</h1></div>
                    <div class="glass-panel rounded-2xl p-6">
                        <div class="flex mb-6 border-b border-subtle">
                            <button class="auth-tab flex-1 pb-3 text-sm ${isLogin?'text-white border-b-2 border-blue-500':'text-white/40'}" data-mode="login">Sign In</button>
                            <button class="auth-tab flex-1 pb-3 text-sm ${!isLogin?'text-white border-b-2 border-blue-500':'text-white/40'}" data-mode="register">Register</button>
                        </div>
                        <button id="google-signin" class="w-full glass-panel py-3 rounded-lg flex items-center justify-center gap-3 text-sm"><svg width="20"><use href="#icon-google"/></svg>Google</button>
                        <div class="relative my-6"><div class="border-t border-subtle"></div><span class="absolute left-1/2 -translate-x-1/2 bg-black px-3 text-white/30 text-xs">or</span></div>
                        <form id="auth-form" class="space-y-4">
                            ${!isLogin?'<input type="text" id="displayName" placeholder="Name" class="w-full bg-white/5 border border-subtle rounded-lg px-4 py-3">':''}
                            <input type="email" id="email" placeholder="Email" required class="w-full bg-white/5 border border-subtle rounded-lg px-4 py-3">
                            <input type="password" id="password" placeholder="Password" required class="w-full bg-white/5 border border-subtle rounded-lg px-4 py-3">
                            ${isLogin?'<button type="button" id="forgot" class="text-xs text-white/40">Forgot?</button>':''}
                            <div id="auth-error" class="text-xs text-red-400 hidden"></div>
                            <button type="submit" class="w-full bg-white/5 border border-subtle py-3 rounded-lg">${isLogin?'Sign In':'Create Account'}</button>
                        </form>
                    </div>
                </div>
            </div>
        `;
        document.querySelectorAll('.auth-tab').forEach(b=>b.addEventListener('click',()=>AppState.authMode=b.dataset.mode));
        document.getElementById('google-signin').onclick=()=>signInWithPopup(auth,googleProvider).catch(e=>showAuthError(e.code));
        document.getElementById('auth-form').onsubmit=async(e)=>{
            e.preventDefault();
            const email=document.getElementById('email').value, pwd=document.getElementById('password').value, name=document.getElementById('displayName')?.value;
            try{
                if(AppState.authMode==='register'){ const cred=await createUserWithEmailAndPassword(auth,email,pwd); if(name) await updateProfile(cred.user,{displayName:name}); }
                else await signInWithEmailAndPassword(auth,email,pwd);
            }catch(e){ showAuthError(e.code); }
        };
        document.getElementById('forgot')?.addEventListener('click',async()=>{
            const email=document.getElementById('email').value;
            if(!email) return showAuthError('Enter email');
            await sendPasswordResetEmail(auth,email); showAuthError('Reset email sent!','success');
        });
        function showAuthError(m,t='error'){ const el=document.getElementById('auth-error'); el.textContent=m; el.classList.remove('hidden'); el.classList.add(t==='success'?'text-emerald-400':'text-red-400'); }
    }

    // ==================== DASHBOARD ====================
    async function renderDashboard() {
        const user=AppState.user;
        const ref=doc(db,'users',user.uid); let profile=(await getDoc(ref)).data();
        if(!profile){ profile={stones:0,streak:0,completedLessons:{}}; await setDoc(ref,profile); }
        AppState.profile=profile;
        const tracks=CURRICULUM.tracks;
        root.innerHTML=`
            <div class="h-full flex flex-col"><header class="px-5 py-4 flex justify-between border-b border-subtle safe-top"><div><h1 class="text-xl">${user.displayName?.split(' ')[0]}</h1><div class="flex items-center gap-2"><span class="text-yellow-400">●</span>${profile.stones||0}</div></div><button id="signout" class="text-white/40 p-2"><svg width="24"><use href="#icon-close"/></svg></button></header>
            <div class="flex-1 overflow-auto p-5"><div class="grid grid-cols-2 gap-4">
                ${tracks.map(t=>`<div class="glass-panel rounded-xl p-4 cursor-pointer" data-track="${t.id}"><div class="text-2xl mb-2">${t.icon}</div><h3 class="font-medium">${t.name}</h3><div class="text-xs text-white/40">${getTrackProgress(t.id)} lessons</div></div>`).join('')}
            </div></div></div>
        `;
        document.querySelectorAll('[data-track]').forEach(el=>el.addEventListener('click',()=>{ AppState.currentTrack=el.dataset.track; AppState.currentLessonIndex=0; AppState.currentStepIndex=0; AppState.route='lesson'; }));
        document.getElementById('signout').onclick=()=>signOut(auth);
    }
    function getTrackProgress(trackId){ return '0/10'; } // placeholder

    // ==================== LESSON VIEW (Multi-language) ====================
    function renderLesson() {
        const track=CURRICULUM.courses[AppState.currentTrack];
        const lesson=track.lessons[AppState.currentLessonIndex];
        const step=lesson.steps[AppState.currentStepIndex];
        const langMap={ js:'javascript', py:'python', java:'java', cpp:'cpp', discordjs:'javascript' };
        const language=langMap[AppState.currentTrack]||'javascript';
        
        root.innerHTML=`
            <div class="h-full flex flex-col safe-top"><header class="px-4 py-3 flex items-center gap-3 border-b border-subtle"><button id="back" class="p-2"><svg width="24"><use href="#icon-arrow-left"/></svg></button><div><div class="text-xs text-white/40">${track.title}</div><div>${lesson.title} · Step ${AppState.currentStepIndex+1}/${lesson.steps.length}</div></div></header>
            <div class="flex-1 overflow-auto p-5">
                ${step.type==='text'? `
                    <h2 class="text-xl font-semibold mb-4">${step.title}</h2><div class="text-white/70 space-y-4">${step.content}</div>
                    ${step.example?`<div class="glass-panel p-4 rounded-xl mt-6"><div class="text-xs text-white/40 mb-2">Example</div><pre class="text-emerald-400 text-sm font-mono">${escapeHtml(step.example)}</pre><button class="run-example mt-3 text-blue-400 flex items-center gap-1"><svg width="16"><use href="#icon-play"/></svg>Run</button><div class="example-output mt-2 text-sm"></div></div>`:''}
                `: `
                    <h2 class="text-xl font-semibold mb-2">${step.title}</h2><p class="text-white/60 mb-4">${step.instructions}</p>
                    <div class="glass-panel rounded-xl overflow-hidden"><div id="editor-container" style="height:250px;"></div></div>
                    <div class="flex gap-3 mt-4"><button id="run-tests" class="flex-1 bg-blue-500/20 border border-blue-400 py-3 rounded-lg flex items-center justify-center gap-2"><svg width="16"><use href="#icon-play"/></svg>Run Tests</button><button id="hint-btn" class="glass-panel px-4 py-3"><svg width="20"><use href="#icon-hint"/></svg></button></div>
                    <div id="test-results" class="mt-4 space-y-2"></div>
                `}
            </div>
            <div class="p-4 border-t border-subtle flex justify-between safe-bottom"><button id="prev" ${AppState.currentStepIndex===0?'disabled':''} class="glass-panel px-5 py-3 rounded-lg">Previous</button><button id="next" class="bg-white/5 border border-subtle px-5 py-3 rounded-lg">${AppState.currentStepIndex===lesson.steps.length-1?'Complete':'Next'}</button></div>
            </div>
        `;
        
        if(step.type==='challenge'){
            setTimeout(()=>{
                require(['vs/editor/editor.main'],()=>{
                    const editor=monaco.editor.create(document.getElementById('editor-container'),{
                        value:step.starterCode, language, theme:'vs-dark', minimap:{enabled:false}, fontSize:13, automaticLayout:true
                    });
                    AppState.editorInstance=editor;
                    document.getElementById('run-tests').onclick=()=>runTests(step, editor.getValue(), language);
                    document.getElementById('hint-btn').onclick=()=>showKMessage(step.hints[0]||'Try thinking about the problem.');
                });
            },50);
        }else{
            document.querySelector('.run-example')?.addEventListener('click',async e=>{
                const code=step.example; let output;
                if(language==='python') output=await runPython(code);
                else output=await runJavaScript(code);
                e.target.nextElementSibling.textContent=output;
            });
        }
        document.getElementById('back').onclick=()=>AppState.route='dashboard';
        document.getElementById('prev').onclick=()=>{ if(AppState.currentStepIndex>0){ AppState.currentStepIndex--; renderLesson(); } };
        document.getElementById('next').onclick=async()=>{
            if(step.type==='challenge'){
                // could validate tests passed
            }
            if(AppState.currentStepIndex<lesson.steps.length-1){ AppState.currentStepIndex++; renderLesson(); }
            else {
                // mark lesson complete
                const prof=AppState.profile; if(!prof.completedLessons) prof.completedLessons={};
                const key=`${AppState.currentTrack}_${lesson.id}`;
                if(!prof.completedLessons[key]){ prof.completedLessons[key]=true; prof.stones=(prof.stones||0)+10; await updateDoc(doc(db,'users',AppState.user.uid),prof); }
                AppState.route='dashboard';
            }
        };
    }

    // ==================== EXECUTION ENGINES ====================
    async function runJavaScript(code){
        return new Promise(res=>{
            const w=new Worker(URL.createObjectURL(new Blob(['self.onmessage=e=>{const logs=[];console.log=(...a)=>logs.push(a.join(" "));try{eval(e.data);self.postMessage(logs.join("\\n"));}catch(e){self.postMessage("Error: "+e.message);}}'],{type:'application/javascript'})));
            w.onmessage=e=>{res(e.data); w.terminate();}; w.postMessage(code);
        });
    }
    async function runPython(code){
        const pd=await loadPyodide();
        pd.runPython('import sys; from io import StringIO; sys.stdout = StringIO()');
        try{ pd.runPython(code); return pd.runPython('sys.stdout.getvalue()'); }
        catch(e){ return e.toString(); }
    }
    async function runTests(step, code, lang){
        const resultsDiv=document.getElementById('test-results');
        resultsDiv.innerHTML='Running...';
        let results=[];
        for(let tc of step.testCases){
            let passed=false, error=null;
            try{
                if(lang==='python'){
                    const full=`${code}\n${tc.test}`; const pd=await loadPyodide();
                    passed=pd.runPython(full);
                }else{
                    passed=await evalTestCaseJS(code, tc.test);
                }
            }catch(e){ error=e.message; }
            results.push({...tc, passed, error});
        }
        resultsDiv.innerHTML=results.map(r=>`<div class="flex items-start gap-2 p-2 rounded ${r.passed?'bg-emerald-500/10':'bg-red-500/10'}"><svg width="16" class="${r.passed?'text-emerald-400':'text-red-400'}"><use href="${r.passed?'#icon-check':'#icon-close'}"/></svg><div><p class="text-sm">${r.desc}</p>${r.error?`<p class="text-xs text-red-400">${r.error}</p>`:''}</div></div>`).join('');
        if(results.every(r=>r.passed)) showKMessage('All tests passed! Great work!');
    }
    function evalTestCaseJS(code, testExpr){
        return new Promise(res=>{
            const w=new Worker(URL.createObjectURL(new Blob([`self.onmessage=e=>{try{eval(e.data.code); self.postMessage(!!eval(e.data.test));}catch(e){self.postMessage(false);}}`],{type:'application/javascript'})));
            w.onmessage=e=>{res(e.data); w.terminate();}; w.postMessage({code, test:testExpr});
        });
    }
    function escapeHtml(t){ return t.replace(/</g,'&lt;'); }
    function showKMessage(t){ const b=document.getElementById('k-bubble'); b.textContent=t; b.style.opacity=1; setTimeout(()=>b.style.opacity=0,4000); }

    // ==================== AUTH LISTENER ====================
    onAuthStateChanged(auth, u=>{ AppState.user=u; AppState.route=u?'dashboard':'auth'; });
    render();
</script>
</body>
</html>
