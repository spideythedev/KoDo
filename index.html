<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KoDo — Learn to Code, Playfully</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Custom responsive utilities */
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .safe-top { padding-top: env(safe-area-inset-top); }
        
        /* K. Koala animations */
        @keyframes bounce {
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-5px); }
        }
        .k-bounce { animation: bounce 0.5s ease infinite; }
        
        /* Mobile tap highlight removal */
        * { -webkit-tap-highlight-color: transparent; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.39.0/min/vs/loader.js"></script>
</head>
<body class="antialiased bg-black text-white overflow-hidden">
    <div id="app-root" class="h-screen w-screen"></div>
    
    <!-- Mascot container (fixed) -->
    <div id="k-koala-container" class="fixed bottom-4 right-4 z-50 pointer-events-none">
        <div id="k-bubble" class="glass-panel p-3 rounded-2xl mb-2 text-sm max-w-[200px] opacity-0 transition-opacity">
            Hi! I'm K. Let's code!
        </div>
        <div class="w-16 h-16 bg-gradient-to-br from-blue-500/20 to-emerald-500/20 rounded-full flex items-center justify-center pointer-events-auto cursor-pointer backdrop-blur border border-white/10 shadow-xl" id="k-mascot">
            <span class="text-3xl">🐨</span>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
